version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: epms-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: epms-redis
    ports:
      - '6379:6379'
    restart: always

volumes:
  mongodb_data:
